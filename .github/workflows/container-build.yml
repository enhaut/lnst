name: Build and Push Controller Container

on:
  push:
    branches: [ master ]

concurrency:
  group: container-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm64

    steps:
    - name: Source branch checkout
      uses: actions/checkout@v4

    - name: Login to Quay.io
      run: podman login -u ${{ secrets.QUAY_USER }} -p ${{ secrets.QUAY_TOKEN }} quay.io

    - name: Build container
      run: |
        podman build \
          --build-arg LNST_SRC=${{ github.server_url }}/${{ github.repository }}.git@${{ github.sha }} \
          -t quay.io/lnst/lnst-controller:${{ matrix.arch }} \
          container_files/controller

    - name: Push container
      run: podman push quay.io/lnst/lnst-controller:${{ matrix.arch }}

  manifest:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Login to Quay.io
      run: podman login -u ${{ secrets.QUAY_USER }} -p ${{ secrets.QUAY_TOKEN }} quay.io

    - name: Create and push manifest
      run: |
        podman manifest create quay.io/lnst/lnst-controller:latest \
          quay.io/lnst/lnst-controller:amd64 \
          quay.io/lnst/lnst-controller:arm64
        podman manifest push quay.io/lnst/lnst-controller:latest
